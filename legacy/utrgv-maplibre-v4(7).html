<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UTRGV Campus Map — MapLibre GL JS</title>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link  href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    :root {
      --accent:        #60a5fa;
      --accent-dim:    rgba(96,165,250,0.14);
      --accent-bdr:    rgba(96,165,250,0.28);
      --accent-act:    rgba(96,165,250,0.22);
      --bg-page:       #060f1c;
      --bg-panel:      rgba(6,15,28,0.94);
      --bg-btn:        rgba(255,255,255,0.04);
      --text-1:        #e2e8f0;
      --text-2:        #7dd3fc;
      --text-3:        #3d6b8a;
      --bdr:           rgba(96,165,250,0.16);
      --shadow:        rgba(0,0,0,0.65);
      --logo:          #60a5fa;
      --b-lo:#bcd8f2; --b-mid:#6aaee0; --b-hi:#2e6db0; --b-top:#193f6a;
      --tr: background 0.32s ease, color 0.32s ease, border-color 0.32s ease;
    }
    [data-theme="light"] {
      --accent:        #ff6b00;
      --accent-dim:    rgba(255,107,0,0.10);
      --accent-bdr:    rgba(255,107,0,0.28);
      --accent-act:    rgba(255,107,0,0.16);
      --bg-page:       #fdf5e8;
      --bg-panel:      rgba(253,245,232,0.96);
      --bg-btn:        rgba(180,80,0,0.05);
      --text-1:        #1a0900;
      --text-2:        #7c3800;
      --text-3:        #b07840;
      --bdr:           rgba(255,107,0,0.18);
      --shadow:        rgba(160,60,0,0.18);
      --logo:          #ff6b00;
      --b-lo:#ffe4c8; --b-mid:#ffb468; --b-hi:#e05f10; --b-top:#9e3200;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg-page); font-family: 'Segoe UI', system-ui, sans-serif; }

    .map-layer { position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity 0.38s ease; }
    .map-layer.active { opacity:1; pointer-events:auto; }

    /* ── Panel ────────────────────────────────────────────────── */
    #panel {
      position:absolute; top:16px; left:16px; width:260px;
      background:var(--bg-panel);
      backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--bdr); border-radius:16px;
      padding:18px; display:flex; flex-direction:column; gap:14px;
      z-index:10; box-shadow:0 8px 36px var(--shadow); transition:var(--tr);
      max-height: calc(100vh - 120px);
    }
    .ph { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .logo { font-size:19px; font-weight:800; letter-spacing:0.04em; color:var(--logo); line-height:1.15; transition:color 0.32s; }
    .logo span { display:block; font-size:10px; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; color:var(--text-3); margin-top:3px; transition:color 0.32s; }
    #theme-btn { flex-shrink:0; width:36px; height:36px; border-radius:9px; border:1px solid var(--bdr); background:var(--bg-btn); cursor:pointer; font-size:17px; display:flex; align-items:center; justify-content:center; transition:var(--tr); }
    #theme-btn:hover { background:var(--accent-dim); border-color:var(--accent-bdr); }
    hr { border:none; border-top:1px solid var(--bdr); transition:border-color 0.32s; }
    .slbl { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-3); transition:color 0.32s; }
    .cgrp { display:flex; flex-direction:column; gap:7px; }
    .cbtn { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--bdr); background:var(--bg-btn); color:var(--text-1); cursor:pointer; text-align:left; display:flex; flex-direction:column; gap:2px; transition:var(--tr); }
    .cbtn:hover  { background:var(--accent-dim); border-color:var(--accent-bdr); }
    .cbtn.active { background:var(--accent-act); border-color:var(--accent); }
    .cname { font-size:13px; font-weight:600; color:var(--text-1); transition:color 0.32s; }
    .cbtn.active .cname { color:var(--accent); }
    .caddr { font-size:11px; color:var(--text-3); transition:color 0.32s; }
    .cbtn.active .caddr { color:var(--text-2); }
    #btn-ov { width:100%; padding:8px; border-radius:8px; border:1px solid var(--bdr); background:transparent; color:var(--text-3); font-size:12px; cursor:pointer; transition:var(--tr); }
    #btn-ov:hover { background:var(--accent-dim); color:var(--text-1); border-color:var(--accent-bdr); }
    .sgrp { display:flex; flex-direction:column; gap:10px; }
    .srow { display:flex; flex-direction:column; gap:4px; }
    .slbl2 { display:flex; justify-content:space-between; font-size:11px; color:var(--text-3); transition:color 0.32s; }
    .slbl2 .v { color:var(--text-1); font-weight:600; transition:color 0.32s; }
    input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:3px; border-radius:99px; background:var(--bdr); outline:none; cursor:pointer; transition:background 0.32s; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid var(--bg-page); transition:background 0.32s,border-color 0.32s; }
    .tgrp { display:flex; flex-direction:column; gap:8px; }
    .trow { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text-3); transition:color 0.32s; }
    .tog { position:relative; width:36px; height:20px; flex-shrink:0; }
    .tog input { opacity:0; width:0; height:0; position:absolute; }
    .tog-track { position:absolute; inset:0; border-radius:99px; background:var(--bdr); border:1px solid var(--bdr); cursor:pointer; transition:var(--tr); }
    .tog input:checked + .tog-track { background:var(--accent); border-color:var(--accent); }
    .tog-thumb { position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; pointer-events:none; transition:transform 0.18s; }
    .tog input:checked ~ .tog-thumb { transform:translateX(16px); }

    /* ── Building list section ────────────────────────────────── */
    .bsect { display:flex; flex-direction:column; gap:0; min-height:0; }

    .bsect-hdr {
      display:flex; align-items:center; justify-content:space-between;
      background:transparent; border:none; cursor:pointer; padding:0;
      width:100%;
    }

    .bsect-arrow { font-size:12px; color:var(--text-3); transition:transform 0.2s, color 0.32s; }
    .bsect-arrow.open { transform:rotate(180deg); }

    #blist {
      display:none;
      flex-direction:column; gap:3px;
      margin-top:8px;
      max-height:180px;
      overflow-y:auto;
      overflow-x:hidden;
      scrollbar-width:thin;
      scrollbar-color: var(--bdr) transparent;
    }
    #blist.open { display:flex; }

    .blitem {
      width:100%; padding:7px 10px; border-radius:8px;
      border:1px solid transparent;
      background:var(--bg-btn);
      color:var(--text-1); cursor:pointer; text-align:left;
      display:flex; align-items:center; gap:8px;
      transition:var(--tr);
    }
    .blitem:hover  { background:var(--accent-dim); border-color:var(--accent-bdr); }
    .blitem.active { background:var(--accent-act); border-color:var(--accent); }

    .blcode {
      font-size:9px; font-weight:700; letter-spacing:0.06em;
      color:var(--accent); background:var(--accent-dim);
      padding:2px 5px; border-radius:4px; flex-shrink:0;
      transition:color 0.32s, background 0.32s;
    }
    .blname { font-size:11px; color:var(--text-1); line-height:1.3; transition:color 0.32s; }
    .bltype { font-size:10px; color:var(--text-3); transition:color 0.32s; }

    /* ── Campus marker pins (DOM — large decorative pin) ─────── */
    .mrkr { width:32px; height:32px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:3px solid #fff; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.4); transition:transform 0.18s; }
    .mrkr:hover { transform:rotate(-45deg) scale(1.12); }
    #map-dark  .mrkr        { background:#60a5fa; }
    #map-dark  .mrkr.active { background:#fff; border-color:#60a5fa; }
    #map-light .mrkr        { background:#ff6b00; }
    #map-light .mrkr.active { background:#fff; border-color:#ff6b00; }
    /* Building pins are WebGL circle layers — no CSS needed */

    /* ── Popups ───────────────────────────────────────────────── */
    #map-dark  .maplibregl-popup-content { background:rgba(6,15,28,0.96)!important; border:1px solid rgba(96,165,250,0.35)!important; }
    #map-light .maplibregl-popup-content { background:rgba(253,245,232,0.97)!important; border:1px solid rgba(255,107,0,0.35)!important; }
    .maplibregl-popup-content { border-radius:12px!important; padding:14px 16px!important; box-shadow:0 8px 30px rgba(0,0,0,0.45)!important; min-width:200px; max-width:240px; backdrop-filter:blur(14px); }
    .maplibregl-popup-tip { display:none; }
    .maplibregl-popup-close-button { font-size:18px!important; padding:4px 8px!important; }
    #map-dark  .maplibregl-popup-close-button { color:#3d6b8a!important; }
    #map-light .maplibregl-popup-close-button { color:#b07840!important; }
    .pname { font-size:14px; font-weight:700; margin-bottom:4px; }
    #map-dark  .pname { color:#60a5fa; } #map-light .pname { color:#ff6b00; }
    .pcode { font-size:10px; font-weight:700; letter-spacing:0.06em; margin-bottom:10px; }
    #map-dark  .pcode { color:#3d6b8a; } #map-light .pcode { color:#b07840; }
    .prow { margin-bottom:7px; }
    .plbl { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
    #map-dark  .plbl { color:#3d6b8a; } #map-light .plbl { color:#b07840; }
    .pval { font-size:12px; line-height:1.5; }
    #map-dark  .pval { color:#e2e8f0; } #map-light .pval { color:#1a0900; }
    .papprox { font-size:10px; font-style:italic; margin-top:8px; padding-top:8px; border-top:1px solid var(--bdr); }
    #map-dark  .papprox { color:#3d6b8a; } #map-light .papprox { color:#b07840; }

    /* ── Info + Badge ─────────────────────────────────────────── */
    #info { position:absolute; bottom:16px; left:16px; background:var(--bg-panel); backdrop-filter:blur(14px); border:1px solid var(--bdr); border-radius:10px; padding:9px 13px; font-size:11px; color:var(--text-3); z-index:10; line-height:1.7; box-shadow:0 4px 16px var(--shadow); transition:var(--tr); }
    #info strong { color:var(--accent); transition:color 0.32s; }
    #badge { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--bg-panel); border:1px solid var(--accent); border-radius:99px; padding:9px 22px; font-size:13px; color:var(--accent); z-index:20; pointer-events:none; backdrop-filter:blur(14px); transition:var(--tr); }
  </style>
</head>

<body>
  <div id="map-dark"  class="map-layer active"></div>
  <div id="map-light" class="map-layer"></div>

  <div id="panel">
    <div class="ph">
      <div class="logo">UTRGV <span>Edinburg &amp; Brownsville · MapLibre</span></div>
      <button id="theme-btn" onclick="toggleTheme()" title="Toggle light / dark (T)">
        <span id="theme-icon">☀</span>
      </button>
    </div>
    <hr />
    <div class="cgrp">
      <div class="slbl">Select campus</div>
      <button class="cbtn active" id="btn-e" onclick="flyTo('e')">
        <span class="cname">Edinburg Campus</span>
        <span class="caddr">1201 W. University Dr., Edinburg TX 78539</span>
      </button>
      <button class="cbtn" id="btn-b" onclick="flyTo('b')">
        <span class="cname">Brownsville Campus</span>
        <span class="caddr">One W. University Blvd., Brownsville TX 78520</span>
      </button>
      <button id="btn-ov" onclick="showOverview()">View both campuses</button>
    </div>
    <hr />
    <div class="sgrp">
      <div class="slbl">Camera</div>
      <div class="srow">
        <div class="slbl2"><span>Pitch (tilt)</span><span class="v" id="vp">60°</span></div>
        <input type="range" id="sp" min="0" max="85" step="1" value="60" oninput="setPitch(+this.value)" />
      </div>
      <div class="srow">
        <div class="slbl2"><span>Bearing (rotation)</span><span class="v" id="vb">-20°</span></div>
        <input type="range" id="sb" min="-180" max="180" step="1" value="-20" oninput="setBearing(+this.value)" />
      </div>
    </div>
    <hr />
    <div class="tgrp">
      <div class="slbl">Layers</div>
      <div class="trow">
        <span>3D buildings</span>
        <label class="tog"><input type="checkbox" id="tog-b" checked onchange="toggleBuildings(this.checked)" /><span class="tog-track"></span><span class="tog-thumb"></span></label>
      </div>
      <div class="trow">
        <span>Terrain</span>
        <label class="tog"><input type="checkbox" id="tog-t" checked onchange="toggleTerrain(this.checked)" /><span class="tog-track"></span><span class="tog-thumb"></span></label>
      </div>
      <div class="trow">
        <span>Auto-rotate</span>
        <label class="tog"><input type="checkbox" id="tog-r" onchange="toggleRotate(this.checked)" /><span class="tog-track"></span><span class="tog-thumb"></span></label>
      </div>
    </div>
    <hr />
    <!-- Collapsible building directory -->
    <div class="bsect">
      <button class="bsect-hdr" onclick="toggleBuildingList()">
        <span class="slbl">Buildings</span>
        <span class="bsect-arrow" id="barrow">▾</span>
      </button>
      <div id="blist"></div>
    </div>
  </div>

  <div id="info">
    <strong>UTRGV Campus Map</strong> · MapLibre GL JS · No API key needed<br>
    Click a <strong>◆ diamond pin</strong> or building name to explore · <strong>T</strong> Theme
  </div>
  <div id="badge"></div>

  <script>
    /* ─────────────────────────────────────────────────────────────
       MAP STYLES
    ───────────────────────────────────────────────────────────── */
    const STYLES = {
      dark:  'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      light: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    };

    const BCOLORS = {
      dark:  { lo:'#bcd8f2', mid:'#5da8e0', hi:'#2564a8', top:'#133560' },
      light: { lo:'#ffe4c8', mid:'#ffb468', hi:'#e05f10', top:'#962800' },
    };

    const TERRAIN_EXAG     = 1.5;
    const BUILDING_OPACITY = 0.90;

    /* ─────────────────────────────────────────────────────────────
       CAMPUS DATA
    ───────────────────────────────────────────────────────────── */
    const CAMPS = {
      e: { label:'Edinburg Campus',    center:[-98.17383, 26.30621], zoom:15.5, pitch:60, bearing:-20, addr:'1201 W. University Dr., Edinburg, TX 78539',    phone:'(956) 665-7338', enroll:'~24,000 students', colls:'Engineering, Business, Sciences, Education, Fine Arts & more' },
      b: { label:'Brownsville Campus', center:[-97.48716, 25.89510], zoom:15.5, pitch:60, bearing:20,  addr:'One W. University Blvd., Brownsville, TX 78520', phone:'(956) 882-7624', enroll:'~10,000 students', colls:'Health Sciences, Liberal Arts, STEM, Education & more' },
    };

    /* ─────────────────────────────────────────────────────────────
       BUILDING DATA
       NOTE: Coordinates are approximate estimates based on campus
       map layout. Use the ✏ coordinate update system below to
       correct any misplaced pins without editing source code.
       Format: [longitude, latitude]
    ───────────────────────────────────────────────────────────── */
    const BUILDINGS = {
      e: [
        { code:'ESSBL',  name:'Student Services Building',                    type:'Student Services',   coords:[-98.17422, 26.30467] },
        { code:'ELIBR',  name:'University Library',                            type:'Library',            coords:[-98.17383, 26.30678] },
        { code:'ECOBE',  name:'Robert C. Vackar College of Business',          type:'Business',           coords:[-98.17342, 26.30754] },
        { code:'ESCNE',  name:'Science Building',                              type:'Sciences',           coords:[-98.17219, 26.30654] },
        { code:'EEDUC',  name:'Education Complex',                             type:'Education',          coords:[-98.17159, 26.30830] },
        { code:'ECCTR',  name:'Computer Center',                               type:'Computing / IT',     coords:[-98.17301, 26.30803] },
        { code:'EMAGC',  name:'Mathematics & General Classrooms',              type:'Academic',           coords:[-98.17292, 26.30762] },
        { code:'EPLAN',  name:'H.E.B. Planetarium',                           type:'Planetarium',        coords:[-98.17193, 26.30648] },
        { code:'EPACC',  name:'Performing Arts Complex C',                    type:'Performing Arts',    coords:[-98.17300, 26.30427] },
        { code:'EPACB',  name:'Performing Arts Complex B',                    type:'Performing Arts',    coords:[-98.17317, 26.30379] },
        { code:'EINNV',  name:'Innovation Building',                           type:'Research',           coords:[-98.17388, 26.30574] },
        { code:'EACSB',  name:'Academic Services Building',                   type:'Academic Services',  coords:[-98.17263, 26.30529] },
        { code:'EUREC',  name:'University Recreation Center',                 type:'Recreation',         coords:[-98.17775, 26.31015] },
        { code:'EHRTG',  name:'Heritage Hall',                                type:'Academic',           coords:[-98.17744, 26.30630] },
        { code:'ETROX',  name:'Troxel Hall',                                  type:'Academic',           coords:[-98.17738, 26.30658] },
        { code:'EIEAB',  name:'Interdisciplinary Engineering & Academic Bldg', type:'Engineering',       coords:[-98.17485, 26.30622] },
        { code:'EHPE1',  name:'Health & Physical Education Complex',           type:'Health / Recreation',coords:[-98.17025, 26.30561] },
        { code:'ELCTR',  name:'The Learning Center',                          type:'Academic Support',   coords:[-98.17306, 26.30635] },
        { code:'ELABS',  name:'Liberal Arts Building South',                  type:'Liberal Arts',       coords:[-98.17592, 26.30610] },
        { code:'EEMLH',  name:'Emilia Schunior Ramirez Hall',                 type:'Academic',           coords:[-98.17746, 26.30587] },
        { code:'ESWKH',  name:'Southwick Hall',                               type:'Academic',           coords:[-98.17270, 26.30469] },
        { code:'ECESS',  name:'Community Engagement & Student Success',       type:'Student Services',   coords:[-98.15076, 26.28730] },
      ],
      b: [
        { code:'BMAIN',  name:'Main Building (The Tower)',                   type:'Administration',     coords:[-97.48681, 25.89363] },
        { code:'BLIBR',  name:'University Library',                           type:'Library',            coords:[-97.48792, 25.89319] },
        { code:'BSETB',  name:'Science & Engineering Technology Building',   type:'Sciences / Eng.',    coords:[-97.48848, 25.89723] },
        { code:'BLHSB',  name:'Life & Health Sciences Building',             type:'Health Sciences',    coords:[-97.48701, 25.89639] },
        { code:'BLCBR',  name:'Luis V. Colom Biomedical Research Facility',  type:'Research',           coords:[-97.48575, 25.89561] },
        { code:'BSTUN',  name:'Student Union Building',                      type:'Student Life',       coords:[-97.48805, 25.89600] },
      ],
    };

    /* ─────────────────────────────────────────────────────────────
       STATE
    ───────────────────────────────────────────────────────────── */
    let theme       = 'dark';
    let terrainOn   = true;
    let rotInt      = null;
    let syncing     = false;
    let activeCampus = 'e';
    let selectedBldg = null;          // currently selected building code
    let campusPopups = { dark:null, light:null };
    let bldgPopups   = { dark:null, light:null };
    let ready        = { dark:false, light:false };
    let blistOpen    = false;

    /* ─────────────────────────────────────────────────────────────
       MAP INIT
    ───────────────────────────────────────────────────────────── */
    function camOf(m) {
      return { center:m.getCenter(), zoom:m.getZoom(), pitch:m.getPitch(), bearing:m.getBearing() };
    }
    function syncTo(src, tgt) {
      if (syncing) return;
      syncing = true;
      tgt.jumpTo(camOf(src));
      syncing = false;
    }

    const maps = {
      dark:  new maplibregl.Map({ container:'map-dark',  style:STYLES.dark,  center:[-97.836,26.102], zoom:9, pitch:30, bearing:0, antialias:true }),
      light: new maplibregl.Map({ container:'map-light', style:STYLES.light, center:[-97.836,26.102], zoom:9, pitch:30, bearing:0, antialias:true }),
    };

    maps.dark.on('move',  () => syncTo(maps.dark,  maps.light));
    maps.light.on('move', () => syncTo(maps.light, maps.dark));

    Object.entries(maps).forEach(([t, m]) => {
      m.addControl(new maplibregl.NavigationControl({ visualizePitch:true }), 'top-right');
      m.addControl(new maplibregl.ScaleControl({ unit:'imperial' }), 'bottom-right');
      m.on('load', () => onMapReady(t));
    });

    /* ─────────────────────────────────────────────────────────────
       STYLE LOAD
    ───────────────────────────────────────────────────────────── */
    function onMapReady(t) {
      const m = maps[t];
      m.addSource('dem', { type:'raster-dem', url:'https://demotiles.maplibre.org/terrain-tiles/tiles.json', tileSize:256, encoding:'mapbox' });
      if (terrainOn) m.setTerrain({ source:'dem', exaggeration:TERRAIN_EXAG });
      m.addLayer({ id:'sky', type:'sky', paint:{ 'sky-type':'atmosphere', 'sky-atmosphere-sun':[0,90], 'sky-atmosphere-sun-intensity':15 } });
      addBuildings(m, t);
      Object.entries(CAMPS).forEach(([id, c]) => addCampusMarker(m, t, id, c));
      addBuildingLayers(m, t);
      ready[t] = true;
      if (ready.dark && ready.light) {
        renderBuildingList('e');
        flyTo('e');
      }
    }

    /* ─────────────────────────────────────────────────────────────
       3D BUILDING LAYER
    ───────────────────────────────────────────────────────────── */
    function findBuildingSource(m) {
      return (m.getStyle()?.layers ?? []).find(l => l['source-layer']==='building' && l.type!=='fill-extrusion')?.source ?? null;
    }

    function addBuildings(m, t) {
      if (m.getLayer('bld3d')) m.removeLayer('bld3d');
      const src = findBuildingSource(m);
      if (!src) return;
      const c   = BCOLORS[t];
      const sym = (m.getStyle()?.layers ?? []).find(l => l.type==='symbol')?.id;
      m.addLayer({
        id:'bld3d', source:src, 'source-layer':'building',
        type:'fill-extrusion', minzoom:13,
        paint:{
          'fill-extrusion-color':['interpolate',['linear'],['coalesce',['get','render_height'],['get','height'],0], 0,c.lo, 20,c.mid, 60,c.hi, 150,c.top],
          'fill-extrusion-height':['interpolate',['linear'],['zoom'], 13,0, 14,['coalesce',['get','render_height'],['get','height'],5]],
          'fill-extrusion-base':['interpolate',['linear'],['zoom'], 13,0, 14,['coalesce',['get','render_min_height'],['get','min_height'],0]],
          'fill-extrusion-opacity':BUILDING_OPACITY,
        },
      }, sym);
      if (!document.getElementById('tog-b').checked) m.setLayoutProperty('bld3d','visibility','none');
    }

    /* ─────────────────────────────────────────────────────────────
       CAMPUS MARKERS  (large pin)
    ───────────────────────────────────────────────────────────── */
    function addCampusMarker(m, t, id, c) {
      const el = document.createElement('div');
      el.className = 'mrkr'; el.id = `mk-${t}-${id}`;
      const popup = new maplibregl.Popup({ offset:26, closeButton:true, closeOnClick:false, maxWidth:'260px' })
        .setHTML(`<div class="pname">${c.label}</div><div class="prow"><div class="plbl">Address</div><div class="pval">${c.addr}</div></div><div class="prow"><div class="plbl">Phone</div><div class="pval">${c.phone}</div></div><div class="prow"><div class="plbl">Enrollment</div><div class="pval">${c.enroll}</div></div><div class="prow"><div class="plbl">Colleges</div><div class="pval">${c.colls}</div></div>`);
      el.addEventListener('click', () => {
        if (campusPopups[t]) campusPopups[t].remove();
        popup.addTo(m); campusPopups[t] = popup;
        flyTo(id);
      });
      new maplibregl.Marker({ element:el, anchor:'bottom' }).setLngLat(c.center).addTo(m);
    }

    /* ─────────────────────────────────────────────────────────────
       BUILDING PINS — WebGL circle layers (no DOM lag)
       Each campus gets its own GeoJSON source + circle layer.
       Pins are rendered by the GPU in the same pass as the map
       tiles, so they move perfectly in sync during pan/zoom.
       Feature state drives the selected appearance with no
       extra render overhead.
    ───────────────────────────────────────────────────────────── */
    function addBuildingLayers(m, t) {
      const pinColor    = t === 'dark' ? 'rgba(96,165,250,0.92)'  : 'rgba(255,107,0,0.92)';
      const selColor    = '#ffffff';
      const strokeNorm  = '#ffffff';
      const strokeSel   = t === 'dark' ? '#60a5fa' : '#ff6b00';

      ['e', 'b'].forEach(campus => {
        const srcId = `bsrc-${campus}`;
        const lyrId = `bpins-${campus}`;

        /* GeoJSON source — one point per building, code stored as
           both feature id (for setFeatureState) and in properties */
        m.addSource(srcId, {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: BUILDINGS[campus].map(b => ({
              type:     'Feature',
              id:       b.code,           // string id — required for feature state
              geometry: { type:'Point', coordinates:b.coords },
              properties: { code:b.code, name:b.name, type:b.type, campus },
            })),
          },
        });

        /* Circle layer — radius scales with zoom so pins are
           visible at overview zoom and legible when close in */
        m.addLayer({
          id:     lyrId,
          type:   'circle',
          source: srcId,
          paint: {
            'circle-radius': [
              'interpolate', ['linear'], ['zoom'],
              10, 4,
              15, 7,
              18, 10,
            ],
            /* White fill when selected, accent color otherwise */
            'circle-color': [
              'case',
              ['boolean', ['feature-state','selected'], false],
              selColor, pinColor,
            ],
            'circle-stroke-width': [
              'case',
              ['boolean', ['feature-state','selected'], false],
              3, 2,
            ],
            /* Accent-colored border when selected, white otherwise */
            'circle-stroke-color': [
              'case',
              ['boolean', ['feature-state','selected'], false],
              strokeSel, strokeNorm,
            ],
          },
        });

        /* Pointer cursor on hover */
        m.on('mouseenter', lyrId, () => { m.getCanvas().style.cursor = 'pointer'; });
        m.on('mouseleave', lyrId, () => { m.getCanvas().style.cursor = ''; });

        /* Click — look up building data and trigger selection */
        m.on('click', lyrId, e => {
          e.preventDefault();
          const props = e.features[0].properties;
          const bldg  = BUILDINGS[props.campus]?.find(b => b.code === props.code);
          if (bldg) selectBuilding(bldg);
        });
      });
    }

    /* ─────────────────────────────────────────────────────────────
       SELECT BUILDING
    ───────────────────────────────────────────────────────────── */
    function selectBuilding(bldg) {
      /* Find which campus this building belongs to */
      const campus = Object.entries(BUILDINGS)
        .find(([, arr]) => arr.some(b => b.code === bldg.code))?.[0];
      if (!campus) return;

      /* Clear previous feature-state selection on both maps */
      if (selectedBldg) {
        ['dark','light'].forEach(t => {
          ['e','b'].forEach(c => {
            const src = `bsrc-${c}`;
            if (maps[t].getSource(src)) {
              maps[t].setFeatureState({ source:src, id:selectedBldg }, { selected:false });
            }
          });
        });
      }

      /* Clear panel active state */
      document.querySelectorAll('.blitem').forEach(b => b.classList.remove('active'));

      /* Apply new selection */
      selectedBldg = bldg.code;

      ['dark','light'].forEach(t => {
        const src = `bsrc-${campus}`;
        if (maps[t].getSource(src)) {
          maps[t].setFeatureState({ source:src, id:bldg.code }, { selected:true });
        }
      });

      /* Highlight list item */
      document.getElementById(`bli-${bldg.code}`)?.classList.add('active');
      document.getElementById(`bli-${bldg.code}`)?.scrollIntoView({ block:'nearest', behavior:'smooth' });

      /* Close previous building popups */
      ['dark','light'].forEach(t => { if (bldgPopups[t]) { bldgPopups[t].remove(); bldgPopups[t]=null; } });

      /* Popup HTML */
      const html = `
        <div class="pname">${bldg.name}</div>
        <div class="pcode">${bldg.code}</div>
        <div class="prow"><div class="plbl">Type</div><div class="pval">${bldg.type}</div></div>
        <div class="papprox">📍 Pin location is approximate — let us know if it needs correction</div>`;

      ['dark','light'].forEach(t => {
        bldgPopups[t] = new maplibregl.Popup({
          offset:14, closeButton:true, closeOnClick:false, maxWidth:'240px',
        })
        .setLngLat(bldg.coords)
        .setHTML(html)
        .addTo(maps[t]);
        bldgPopups[t].on('close', () => { bldgPopups[t] = null; });
      });

      /* Fly to building on active map — sync carries the inactive map */
      maps[theme].flyTo({
        center:  bldg.coords,
        zoom:    17.5,
        pitch:   60,
        bearing: maps[theme].getBearing(),
        speed:   0.5, curve:1.4,
        easing:  t => t<0.5 ? 2*t*t : -1+(4-2*t)*t,
      });
    }

    /* ─────────────────────────────────────────────────────────────
       BUILDING LIST  (panel)
    ───────────────────────────────────────────────────────────── */
    function renderBuildingList(campusId) {
      const list = document.getElementById('blist');
      list.innerHTML = '';
      BUILDINGS[campusId].forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'blitem';
        btn.id = `bli-${b.code}`;
        btn.innerHTML = `<span class="blcode">${b.code}</span><span class="blname">${b.name}</span>`;
        btn.addEventListener('click', () => selectBuilding(b));
        list.appendChild(btn);
      });
    }

    function toggleBuildingList() {
      blistOpen = !blistOpen;
      const list  = document.getElementById('blist');
      const arrow = document.getElementById('barrow');
      list.classList.toggle('open', blistOpen);
      arrow.classList.toggle('open', blistOpen);
    }

    /* ─────────────────────────────────────────────────────────────
       THEME TOGGLE
    ───────────────────────────────────────────────────────────── */
    function toggleTheme() {
      const next = theme==='dark' ? 'light' : 'dark';
      document.getElementById('map-'+theme).classList.remove('active');
      document.getElementById('map-'+next).classList.add('active');
      const activeId = document.querySelector('.cbtn.active')?.id?.replace('btn-','');
      if (activeId) {
        document.querySelectorAll('.mrkr').forEach(m => m.classList.remove('active'));
        document.getElementById(`mk-${next}-${activeId}`)?.classList.add('active');
      }
      theme = next;
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-icon').textContent = theme==='dark' ? '☀' : '☾';
    }

    /* ─────────────────────────────────────────────────────────────
       CAMPUS NAVIGATION
    ───────────────────────────────────────────────────────────── */
    function flyTo(id) {
      const c = CAMPS[id];
      if (!c) return;
      activeCampus = id;

      /* Clear WebGL feature state selection */
      if (selectedBldg) {
        ['dark','light'].forEach(t => {
          ['e','b'].forEach(campus => {
            const src = `bsrc-${campus}`;
            if (maps[t].getSource(src)) {
              maps[t].setFeatureState({ source:src, id:selectedBldg }, { selected:false });
            }
          });
        });
        selectedBldg = null;
      }

      document.querySelectorAll('.blitem').forEach(b => b.classList.remove('active'));
      ['dark','light'].forEach(t => { if (bldgPopups[t]) { bldgPopups[t].remove(); bldgPopups[t]=null; } });

      document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-'+id)?.classList.add('active');
      document.querySelectorAll('.mrkr').forEach(m => m.classList.remove('active'));
      document.getElementById(`mk-dark-${id}`)?.classList.add('active');
      document.getElementById(`mk-light-${id}`)?.classList.add('active');

      renderBuildingList(id);

      showBadge(`Flying to ${c.label}…`);
      maps[theme].flyTo({ center:c.center, zoom:c.zoom, pitch:c.pitch, bearing:c.bearing, speed:0.55, curve:1.5, easing:t=>t<0.5?2*t*t:-1+(4-2*t)*t });
      document.getElementById('sp').value=c.pitch;  document.getElementById('vp').textContent=c.pitch+'°';
      document.getElementById('sb').value=c.bearing; document.getElementById('vb').textContent=c.bearing+'°';
      maps[theme].once('moveend', hideBadge);
    }

    function showOverview() {
      document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.mrkr').forEach(m => m.classList.remove('active'));
      ['dark','light'].forEach(t => {
        if (campusPopups[t]) { campusPopups[t].remove(); campusPopups[t]=null; }
        if (bldgPopups[t])   { bldgPopups[t].remove();   bldgPopups[t]=null;   }
      });
      showBadge('Zooming to Rio Grande Valley…');
      maps[theme].fitBounds([[-98.220,25.852],[-97.454,26.352]], { padding:{top:80,bottom:80,left:300,right:80}, pitch:30, bearing:0, duration:2200, easing:t=>t<0.5?2*t*t:-1+(4-2*t)*t });
      document.getElementById('sp').value=30; document.getElementById('vp').textContent='30°';
      document.getElementById('sb').value=0;  document.getElementById('vb').textContent='0°';
      maps[theme].once('moveend', hideBadge);
    }

    /* ─────────────────────────────────────────────────────────────
       PANEL CONTROLS
    ───────────────────────────────────────────────────────────── */
    function setPitch(v)   { maps[theme].easeTo({ pitch:v,   duration:300 }); document.getElementById('vp').textContent=v+'°'; }
    function setBearing(v) { maps[theme].easeTo({ bearing:v, duration:300 }); document.getElementById('vb').textContent=v+'°'; }

    function toggleBuildings(on) {
      ['dark','light'].forEach(t => { if (maps[t].getLayer('bld3d')) maps[t].setLayoutProperty('bld3d','visibility',on?'visible':'none'); });
    }
    function toggleTerrain(on) {
      terrainOn = on;
      ['dark','light'].forEach(t => on ? maps[t].setTerrain({source:'dem',exaggeration:TERRAIN_EXAG}) : maps[t].setTerrain(null));
    }
    function toggleRotate(on) {
      if (on) { rotInt=setInterval(()=>{ maps[theme].easeTo({bearing:maps[theme].getBearing()+0.3,duration:50,easing:t=>t}); },50); }
      else    { clearInterval(rotInt); rotInt=null; }
    }

    /* ─────────────────────────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────────────────────────── */
    function showBadge(msg) { const el=document.getElementById('badge'); el.textContent=msg; el.style.display='block'; }
    function hideBadge()    { document.getElementById('badge').style.display='none'; }

    document.addEventListener('keydown', e => {
      if (e.key==='1') flyTo('e');
      if (e.key==='2') flyTo('b');
      if (e.key==='0') showOverview();
      if (e.key==='t'||e.key==='T') toggleTheme();
      if (e.key==='r'||e.key==='R') { const cb=document.getElementById('tog-r'); cb.checked=!cb.checked; toggleRotate(cb.checked); }
    });
  </script>
</body>
</html>
